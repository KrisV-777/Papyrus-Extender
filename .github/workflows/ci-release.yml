name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-scripts:
    name: Compile Papyrus scripts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache script sources
        id: cache-sources
        uses: actions/cache@v4
        with:
          path: |
            .github/Papyrus/SRC
            .github/Papyrus/SRC/TESV_Papyrus_Flags.flg
          key: papyrus-script-sources-v1

      - name: Cache Caprica
        id: cache-caprica
        uses: actions/cache@v4
        with:
          path: .github/Caprica
          key: ${{ runner.os }}-caprica-0.3.0

      - name: Fetch Caprica 0.3.0
        if: steps.cache-caprica.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release download -O .github/Caprica.7z -p '*.7z' -R Orvid/Caprica v0.3.0
          7z x .github/Caprica.7z "-o.github\Caprica"

      - name: Checkout Papyrus sources
        if: steps.cache-sources.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .github/Papyrus -Force | Out-Null
          $repos = @('SRC')
          Push-Location .github/Papyrus
          foreach ($repo in $repos) {
            New-Item -ItemType Directory -Name $repo -Force | Out-Null
            Push-Location $repo
            git init
            git remote add origin https://github.com/IHateMyKite/PAPYRUS.git
            git sparse-checkout set --no-cone $repo
            git fetch --depth=1 origin main
            git checkout -b main origin/main
            Remove-Item .git -Recurse -Force
            Pop-Location
          }
          Pop-Location

      - name: Checkout TESV flags file
        if: steps.cache-sources.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Push-Location .github/Papyrus/SRC
          New-Item -ItemType Directory -Path temp -Force | Out-Null
          Push-Location temp
          git init
          git remote add origin https://github.com/Rukan/Grimy-Skyrim-Papyrus-Source.git
          git sparse-checkout set --no-cone TESV_Papyrus_Flags.flg
          git fetch --depth=1 origin master
          git checkout -b master origin/master
          Remove-Item .git -Recurse -Force
          Move-Item TESV_Papyrus_Flags.flg ../TESV_Papyrus_Flags.flg -Force
          Pop-Location
          Remove-Item temp -Recurse -Force
          Pop-Location

      - name: Prepare script output directory
        shell: pwsh
        run: |
          if (Test-Path dist/scripts) {
            Remove-Item dist/scripts/* -Force
          } else {
            New-Item -ItemType Directory -Path dist/scripts -Force | Out-Null
          }

      - name: Run Caprica
        shell: pwsh
        run: |
          .github/Caprica/Caprica.exe --game skyrim --import ".github/Papyrus/SRC;" --output "dist/scripts" --flags=".github/Papyrus/SRC/TESV_Papyrus_Flags.flg" "${{ github.workspace }}/dist/Source/Scripts" -R -q

      - name: Upload compiled scripts artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-scripts
          path: dist/scripts
          if-no-files-found: error

  build:
    name: Build
    needs: compile-scripts
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect version change
        id: version
        shell: pwsh
        run: |
          $versionPattern = 'PROJECT_VERSION = "([^"]+)"'
          $currentFile = Get-Content xmake.lua -Raw

          if ($currentFile -notmatch $versionPattern) {
            throw 'Unable to find PROJECT_VERSION in xmake.lua.'
          }

          $currentVersion = $Matches[1]
          $versionChanged = 'false'
          $before = '${{ github.event.before }}'

          if ('${{ github.event_name }}' -eq 'push' -and $before -and $before -ne '0000000000000000000000000000000000000000') {
            $previousFile = git show "${before}:xmake.lua" 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousFile -match $versionPattern) {
              $previousVersion = $Matches[1]
              if ($previousVersion -ne $currentVersion) {
                $versionChanged = 'true'
              }
            }
          }

          "version=$currentVersion" >> $env:GITHUB_OUTPUT
          "version_tag=v$currentVersion" >> $env:GITHUB_OUTPUT
          "version_changed=$versionChanged" >> $env:GITHUB_OUTPUT

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install xmake
        shell: pwsh
        run: choco install xmake --yes --no-progress

      - name: Configure
        shell: pwsh
        run: xmake f -m release --build_papyrus=n

      - name: Build
        shell: pwsh
        run: xmake build ScrabsPapyrusExtender --shallow

      - name: Download compiled scripts artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-scripts
          path: dist/Scripts

      - name: Package release artifact
        id: package
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $artifactName = "ScrabsPapyrusExtender-$version"
          $archivePath = Join-Path $env:RUNNER_TEMP "$artifactName.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP $artifactName
          $pluginDir = Join-Path $stagingDir 'SKSE\Plugins'

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          Copy-Item dist\* $stagingDir -Recurse -Force
          Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.dll $pluginDir -Force

          if (Test-Path build\windows\x64\release\ScrabsPapyrusExtender.pdb) {
            Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.pdb $pluginDir -Force
          }

          Compress-Archive -Path (Join-Path $stagingDir '*') -DestinationPath $archivePath

          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.package.outputs.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing tag
        id: tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ needs.build.outputs.version_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifact
        if: steps.tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-assets

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: ${{ needs.build.outputs.version_tag }}
          files: release-assets/${{ needs.build.outputs.artifact_name }}.zip
          generate_release_notes: true