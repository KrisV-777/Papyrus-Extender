name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-scripts:
    name: Verify Papyrus scripts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .pex files are up to date
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $srcRoot = 'dist/Source/Scripts'
          $binRoot = 'dist/Scripts'

          if (-not (Test-Path $srcRoot)) {
            throw "Missing source scripts directory: $srcRoot"
          }

          if (-not (Test-Path $binRoot)) {
            throw "Missing compiled scripts directory: $binRoot"
          }

          $pscFiles = Get-ChildItem -Path $srcRoot -Filter *.psc -File
          if (-not $pscFiles -or $pscFiles.Count -eq 0) {
            throw "No .psc files found in $srcRoot"
          }

          $failures = @()

          foreach ($psc in $pscFiles) {
            $pexPath = Join-Path $binRoot ($psc.BaseName + '.pex')
            if (-not (Test-Path $pexPath)) {
              $failures += "Missing compiled file for $($psc.Name): $pexPath"
              continue
            }

            $pscTime = $psc.LastWriteTimeUtc
            $pexTime = (Get-Item $pexPath).LastWriteTimeUtc

            if ($pexTime -lt $pscTime) {
              $failures += "$pexPath is older than $($psc.FullName)"
            }
          }

          if ($failures.Count -gt 0) {
            Write-Host "Found outdated Papyrus compiled scripts:"
            $failures | ForEach-Object { Write-Host "- $_" }
            throw "Papyrus .pex files are not up to date with .psc sources."
          }

          Write-Host "All .pex files are up to date with their .psc counterparts."

  build:
    name: Build
    needs: verify-scripts
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect version change
        id: version
        shell: pwsh
        run: |
          $versionPattern = 'PROJECT_VERSION = "([^"]+)"'
          $currentFile = Get-Content xmake.lua -Raw

          if ($currentFile -notmatch $versionPattern) {
            throw 'Unable to find PROJECT_VERSION in xmake.lua.'
          }

          $currentVersion = $Matches[1]
          $versionChanged = 'false'
          $before = '${{ github.event.before }}'

          if ('${{ github.event_name }}' -eq 'push' -and $before -and $before -ne '0000000000000000000000000000000000000000') {
            $previousFile = git show "${before}:xmake.lua" 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousFile -match $versionPattern) {
              $previousVersion = $Matches[1]
              if ($previousVersion -ne $currentVersion) {
                $versionChanged = 'true'
              }
            }
          }

          "version=$currentVersion" >> $env:GITHUB_OUTPUT
          "version_tag=v$currentVersion" >> $env:GITHUB_OUTPUT
          "version_changed=$versionChanged" >> $env:GITHUB_OUTPUT

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install xmake
        shell: pwsh
        run: choco install xmake --yes --no-progress

      - name: Configure
        shell: pwsh
        run: xmake f -m release --build_papyrus=n

      - name: Build
        shell: pwsh
        run: xmake build ScrabsPapyrusExtender --shallow

      - name: Package release artifact
        id: package
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $artifactName = "ScrabsPapyrusExtender-$version"
          $archivePath = Join-Path $env:RUNNER_TEMP "$artifactName.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP $artifactName
          $pluginDir = Join-Path $stagingDir 'SKSE\Plugins'

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          Copy-Item dist\* $stagingDir -Recurse -Force
          Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.dll $pluginDir -Force

          if (Test-Path build\windows\x64\release\ScrabsPapyrusExtender.pdb) {
            Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.pdb $pluginDir -Force
          }

          Compress-Archive -Path (Join-Path $stagingDir '*') -DestinationPath $archivePath

          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.package.outputs.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing tag
        id: tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ needs.build.outputs.version_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifact
        if: steps.tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-assets

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: ${{ needs.build.outputs.version_tag }}
          files: release-assets/${{ needs.build.outputs.artifact_name }}.zip
          generate_release_notes: true