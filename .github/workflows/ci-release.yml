name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_ASSET_DIR: release-assets

jobs:
  verify-scripts:
    name: Verify Papyrus scripts
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .pex files are up to date
        run: |
          $ErrorActionPreference = 'Stop'
          $srcRoot = 'dist/Source/Scripts'
          $binRoot = 'dist/Scripts'

          if (-not (Test-Path $srcRoot)) {
            throw "Missing source scripts directory: $srcRoot"
          }

          if (-not (Test-Path $binRoot)) {
            throw "Missing compiled scripts directory: $binRoot"
          }

          $pscFiles = Get-ChildItem -Path $srcRoot -Filter *.psc -File
          if (-not $pscFiles -or $pscFiles.Count -eq 0) {
            throw "No .psc files found in $srcRoot"
          }

          $failures = @()

          foreach ($psc in $pscFiles) {
            $pexPath = Join-Path $binRoot ($psc.BaseName + '.pex')
            if (-not (Test-Path $pexPath)) {
              $failures += "Missing compiled file for $($psc.Name): $pexPath"
              continue
            }

            $pscGitPath = ((Resolve-Path -Relative $psc.FullName) -replace '^[.][\\/]', '') -replace '\\', '/'
            $pexGitPath = ((Resolve-Path -Relative $pexPath) -replace '^[.][\\/]', '') -replace '\\', '/'

            $pscTime = git log -1 --format=%ct -- $pscGitPath
            $pexTime = git log -1 --format=%ct -- $pexGitPath

            if (-not $pscTime) {
              $failures += "Unable to read git timestamp for $pscGitPath"
              continue
            }

            if (-not $pexTime) {
              $failures += "Unable to read git timestamp for $pexGitPath"
              continue
            }

            if ([int64]$pexTime -lt [int64]$pscTime) {
              $failures += "$pexGitPath is older than $pscGitPath"
            }
          }

          if ($failures.Count -gt 0) {
            Write-Host "Found outdated Papyrus compiled scripts:"
            $failures | ForEach-Object { Write-Host "- $_" }
            throw "Papyrus .pex files are not up to date with .psc sources."
          }

          Write-Host "All .pex files are up to date with their .psc counterparts."

  build:
    name: Build
    needs: verify-scripts
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect version change
        id: version
        run: |
          $versionPattern = 'PROJECT_VERSION = "([^"]+)"'
          $currentFile = Get-Content xmake.lua -Raw

          Write-Host "Debug: github.event_name='${{ github.event_name }}'"
          Write-Host "Debug: github.ref='${{ github.ref }}'"
          Write-Host "Debug: github.sha='${{ github.sha }}'"

          if ($currentFile -notmatch $versionPattern) {
            throw 'Unable to find PROJECT_VERSION in xmake.lua.'
          }

          $currentVersion = $Matches[1]
          $versionChanged = 'false'
          $before = '${{ github.event.before }}'
          $previousVersion = ''

          Write-Host "Debug: currentVersion='$currentVersion'"
          Write-Host "Debug: github.event.before='$before'"

          if ('${{ github.event_name }}' -eq 'push' -and $before -and $before -ne '0000000000000000000000000000000000000000') {
            Write-Host "Debug: using push comparison against before SHA"
            $previousFile = git show "${before}:xmake.lua" 2>$null
            Write-Host "Debug: git show exit code=$LASTEXITCODE"
            if ($LASTEXITCODE -eq 0 -and $previousFile -match $versionPattern) {
              $previousVersion = $Matches[1]
              Write-Host "Debug: previousVersion='$previousVersion'"
              if ($previousVersion -ne $currentVersion) {
                $versionChanged = 'true'
              }
            } elseif ($LASTEXITCODE -ne 0) {
              Write-Host "Debug: failed to read previous xmake.lua from before SHA"
            } else {
              Write-Host "Debug: previous xmake.lua did not match versionPattern"
            }
          } else {
            Write-Host "Debug: push comparison skipped (event is not push or before SHA unavailable)"
          }

          Write-Host "Debug: final version='$currentVersion' version_changed='$versionChanged'"

          "version=$currentVersion" >> $env:GITHUB_OUTPUT
          "version_tag=v$currentVersion" >> $env:GITHUB_OUTPUT
          "version_changed=$versionChanged" >> $env:GITHUB_OUTPUT

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Configure
        run: xmake f -y -m release --build_papyrus=n

      - name: Build
        run: xmake -b -y ScrabsPapyrusExtender

      - name: Package release artifact
        id: package
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $artifactName = "Kris Papyrus Extender - V$version"
          $archivePath = Join-Path $env:RUNNER_TEMP "$artifactName.zip"
          $stagingDir = Join-Path $env:RUNNER_TEMP $artifactName
          $pluginDir = Join-Path $stagingDir 'SKSE\Plugins'

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Copy-Item -Path dist\* -Destination $stagingDir -Recurse -Force

          $skseDir = Join-Path $stagingDir 'SKSE'
          if (Test-Path $skseDir -PathType Leaf) {
            Remove-Item $skseDir -Force
          }
          New-Item -ItemType Directory -Path $skseDir -Force | Out-Null

          if (Test-Path $pluginDir -PathType Leaf) {
            Remove-Item $pluginDir -Force
          }
          New-Item -ItemType Directory -Path $pluginDir -Force | Out-Null
          Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.dll $pluginDir -Force

          if (Test-Path build\windows\x64\release\ScrabsPapyrusExtender.pdb) {
            Copy-Item build\windows\x64\release\ScrabsPapyrusExtender.pdb $pluginDir -Force
          }

          Compress-Archive -Path (Join-Path $stagingDir '*') -DestinationPath $archivePath

          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.package.outputs.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing tag
        id: tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ needs.build.outputs.version_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifact
        if: steps.tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ env.RELEASE_ASSET_DIR }}

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version_tag }}
          name: ${{ needs.build.outputs.version_tag }}
          files: ${{ env.RELEASE_ASSET_DIR }}/${{ needs.build.outputs.artifact_name }}.zip
          generate_release_notes: true
